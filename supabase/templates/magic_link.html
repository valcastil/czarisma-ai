<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Verify your Charisma account</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0a;font-family:'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0a;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background:#111;border-radius:16px;border:1px solid #222;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td align="center" style="padding:32px 40px 24px;">
              <p style="margin:0;font-size:32px;">✨</p>
              <h1 style="margin:12px 0 0;color:#D4AF37;font-size:24px;font-weight:700;letter-spacing:0.5px;">
                Charisma Tracker
              </h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:0 40px 32px;">
              <p style="margin:0 0 8px;color:#ccc;font-size:16px;">Your verification code is:</p>

              <!-- OTP Code -->
              <div style="background:#1a1a1a;border:1.5px solid #D4AF37;border-radius:12px;padding:20px;text-align:center;margin:16px 0;">
                <span style="color:#D4AF37;font-size:40px;font-weight:700;letter-spacing:12px;">
                  {{ .Token }}
                </span>
              </div>

              <p style="margin:0 0 16px;color:#888;font-size:14px;line-height:1.6;">
                Enter this code in the app to verify your email address.
                This code expires in <strong style="color:#ccc;">1 hour</strong>.
              </p>

              <p style="margin:0;color:#666;font-size:13px;">
                If you didn't create an account with Charisma Tracker, you can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px;border-top:1px solid #222;">
              <p style="margin:0;color:#555;font-size:12px;text-align:center;">
                &copy; Charisma Tracker — Do not reply to this email.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
